version: "3.8"

services:
  postgres:
    image: postgres:alpine3.20
    container_name: pouantou-postgres
    environment:
      POSTGRES_USER: pouantou_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: pouantou_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pouantou_user -d pouantou_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: pouantou-app
  #   ports:
  #     - "3000:3000"
